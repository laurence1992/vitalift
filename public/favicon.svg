<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0B0C8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C6FFF;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#7C6FFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0D0D18" />
  
  <!-- Subtle border -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none" stroke="#1E1E2E" stroke-width="3" />
  
  <!-- Radial glow behind V -->
  <ellipse cx="256" cy="260" rx="140" ry="160" fill="url(#glowGradient)" />
  
  <!-- V shape with gradient stroke -->
  <g>
    <!-- Left arm of V -->
    <line x1="122" y1="138" x2="256" y2="388" stroke="url(#vGradient)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Right arm of V -->
    <line x1="390" y1="138" x2="256" y2="388" stroke="url(#vGradient)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- Green circle at top right of V -->
  <circle cx="390" cy="138" r="20" fill="#10B981" />
  
  <!-- Inner highlight dot for gem/glassy effect -->
  <circle cx="382" cy="130" r="7" fill="#6EFFD8" opacity="0.6" />
</svg>
