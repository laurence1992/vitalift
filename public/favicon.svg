<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#B0B0C8" />
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="112" fill="#0D0D18" />
  <rect width="512" height="512" rx="112" fill="none" stroke="#1E1E2E" stroke-width="3" />

  <!-- V shape — thick white-to-grey gradient strokes -->
  <polyline points="122,138 256,388 390,138" fill="none" stroke="url(#vGrad)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Green dot at top-right of V -->
  <circle cx="390" cy="138" r="20" fill="#10B981" />
  <circle cx="382" cy="130" r="7" fill="#6EFFD8" opacity="0.6" />
</svg>
